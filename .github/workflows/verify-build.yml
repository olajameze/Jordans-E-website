# Catches broken static output before Vercel (missing public/, failed LFS, etc.)
name: Verify build

on:
  push:
    branches: [main, add-videos]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Build (same as Vercel)
        run: npm run build

      - name: Assert deployable output
        run: |
          test -d public
          test -f public/index.html
          test -f public/css/style.css
          test -f public/js/script.js
          test -f public/work.html
          test -d public/videos
